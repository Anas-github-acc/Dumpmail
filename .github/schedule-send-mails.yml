name: Schedule Send Mails

on:
  schedule:
    - cron: "*/10 * * * *"
      timezone: "Asia/Kolkata"

  workflow_dispatch:

jobs:
  send-mails:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: dumpmail-send-mails
      cancel-in-progress: false
    
    container:
      image: ghcr.io/anas-github-acc/dumpmail:latest
    
    env:
      USER_ID: ${{ secrets.USER_ID }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
    
    steps:
      # - name: Debug paths
      #   run: |
      #     pwd
      #     ls -la
      #     ls -la /app || true
      #     find . -name runJob.js
      #     find / -name runJob.js 2>/dev/null | head -20

      - name: Run job
        run: node --use-system-ca /app/app/scripts/runJob.js send
